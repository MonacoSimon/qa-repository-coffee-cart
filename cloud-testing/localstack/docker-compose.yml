services:
  localstack:
    image: localstack/localstack:3.0
    container_name: localstack-coffee-shop

    ports:
      - "4566:4566"

    environment:
      - SERVICES=s3,lambda,sqs,dynamodb,apigateway
      - DEFAULT_REGION=us-east-1
      - DEBUG=1
      - DATA_DIR=/var/lib/localstack

    volumes:
      - "./.localstack-data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

    networks:
      - localstack-network

networks:
  localstack-network:
    name: localstack-network
